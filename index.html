<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VaiperX Aimbot</title>
    
    <link rel="apple-touch-icon" href="https://img2.pic.in.th/IMG_5305b940159297273f22.jpeg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/jpeg" href="https://img2.pic.in.th/IMG_5305b940159297273f22.jpeg">

    <style>
        /* [CSS เดิมของคุณทั้งหมด] */
        :root { --bg-body: #050505; --bg-panel: rgba(18, 18, 20, 0.95); --accent: #ff0033; --text-main: #ffffff; --border: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; } /* กันลากคลุมตัวหนังสือ */
        body { background-color: var(--bg-body); font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: var(--text-main); overflow: hidden; }
        .window { width: 90%; max-width: 340px; background: var(--bg-panel); backdrop-filter: blur(20px); border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.8); padding: 25px; text-align: center; }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent); margin-bottom: 15px; box-shadow: 0 0 15px var(--accent); object-fit: cover; }
        .header h1 { margin: 0; font-size: 22px; letter-spacing: 1px; }
        .header p { margin: 5px 0 20px; font-size: 10px; color: var(--accent); letter-spacing: 2px; font-weight: bold; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 12px; }
        .switch { position: relative; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #333; transition: .3s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }
        .btn-inject { display: block; width: 100%; padding: 16px; background: linear-gradient(135deg, #ff0033 0%, #880000 100%); border: none; border-radius: 15px; color: white; font-weight: bold; text-decoration: none; box-shadow: 0 8px 20px rgba(255, 0, 51, 0.3); }
        .status { margin-top: 15px; font-size: 10px; color: #00ff88; }
    </style>
</head>
<body oncontextmenu="return false;"> <div class="window">
    <img src="https://img2.pic.in.th/IMG_5305b940159297273f22.jpeg" class="profile-img">
    <div class="header">
        <h1>VaiperX Aimbot</h1>
        <p>V1.0 ANTI-DETECTED</p>
    </div>
    <div class="content">
        <div class="row"><span>ยิงตัวโดนหัว</span><label class="switch"><input type="checkbox" checked><span class="slider"></span></label></div>
        <div class="row"><span>ล็อคเป้าดูดหัว</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
        <div class="row"><span>ระบบกันแบน</span><label class="switch"><input type="checkbox" checked><span class="slider"></span></label></div>
    </div>
    <div class="footer">
        <a href="potatso://" class="btn-inject">INJECT SCRIPT</a>
        <div class="status">● PROTECTED SYSTEM</div>
    </div>
</div>

<script>
    // 1. กันคลิกขวา
    document.addEventListener('contextmenu', event => event.preventDefault());

    // 2. กันปุ่ม F12, Ctrl+Shift+I, Ctrl+U (ดู Source), Ctrl+Shift+J (Console)
    document.onkeydown = function(e) {
        if (e.keyCode == 123) { return false; } // F12
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { return false; }
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { return false; }
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { return false; }
        if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; }
    };

    // 3. ดักจับถ้ามีการเปิด DevTools จะทำการลบหน้าเว็บทิ้งหรือ Refresh
    setInterval(function(){
        var before = new Date().getTime();
        debugger;
        var after = new Date().getTime();
        if (after - before > 100) { // ถ้าหยุดที่ debugger นานเกินไป (เปิด DevTools อยู่)
            document.querySelector('body').innerHTML = '<h1 style="color:red; text-align:center; margin-top:50px;">SECURITY BREACH: Access Denied!</h1>';
        }
    }, 1000);

    // 4. กันลากรูป
    document.querySelectorAll('img').forEach(img => {
        img.onmousedown = () => false;
    });
</script>

</body>
</html>
