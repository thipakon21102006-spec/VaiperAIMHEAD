<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VaiperX ULTRA PRO</title>
    
    <!-- แท็กไอคอนสำหรับ iOS (iPhone/iPad) -->
    <link rel="apple-touch-icon" href="https://i.postimg.cc/dtPNnP5B/1208970E-0281-4988-A5EE-6B8EBF602D01.png">
    <link rel="apple-touch-icon-precomposed" href="https://i.postimg.cc/dtPNnP5B/1208970E-0281-4988-A5EE-6B8EBF602D01.png">
    
    <!-- แท็กไอคอนสำหรับ Android และ Browser ทั่วไป -->
    <link rel="shortcut icon" type="image/png" href="https://i.postimg.cc/dtPNnP5B/1208970E-0281-4988-A5EE-6B8EBF602D01.png">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/dtPNnP5B/1208970E-0281-4988-A5EE-6B8EBF602D01.png">
    
    <!-- แท็กสำหรับบังคับให้ระบบจำรูปภาพ (Social & System) -->
    <meta property="og:image" content="https://i.postimg.cc/dtPNnP5B/1208970E-0281-4988-A5EE-6B8EBF602D01.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VaiperX">

    <style>
        :root {
            --bg-body: #050507;
            --bg-panel: rgba(13, 13, 17, 0.98);
            --accent: #ff0033;
            --accent-glow: rgba(255, 0, 51, 0.4);
            --text-main: #f0f0f0;
            --text-dim: #707075;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.06);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body { 
            background-color: var(--bg-body); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; color: var(--text-main); 
            overflow: hidden;
            background-image: radial-gradient(circle at center, #1a0505 0%, #050507 100%);
        }

        .window { 
            width: 90%; max-width: 360px; 
            background: var(--bg-panel); 
            backdrop-filter: blur(40px);
            border-radius: 35px; 
            border: 1px solid var(--card-border); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.8); 
            padding: 35px 25px; text-align: center;
            position: relative; 
            overflow: hidden;
            z-index: 10;
        }

        #lightningCanvas {
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; 
            z-index: 1;
            opacity: 0.8;
        }

        .content-wrap { position: relative; z-index: 5; }

        .profile-img { 
            width: 95px; height: 95px; border-radius: 28px;
            border: 1px solid var(--accent); 
            margin-bottom: 15px; 
            box-shadow: 0 10px 20px var(--accent-glow);
            object-fit: cover;
        }

        .header h1 { 
            margin: 0; font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { margin: 5px 0 30px; font-size: 10px; color: var(--accent); letter-spacing: 4px; font-weight: 700; text-transform: uppercase; }

        .menu-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }
        
        .row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 16px 20px; 
            background: var(--card-bg); 
            border-radius: 20px; 
            border: 1px solid var(--card-border);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .row:hover { border-color: rgba(255, 0, 51, 0.3); background: rgba(255, 255, 255, 0.05); }

        .label-group { display: flex; align-items: center; gap: 12px; }
        .icon-box {
            width: 32px; height: 32px; 
            display: flex; align-items: center; justify-content: center;
            background: rgba(255, 0, 51, 0.1);
            border-radius: 10px; color: var(--accent);
        }
        .row span { font-size: 14px; font-weight: 600; color: var(--text-main); }

        .switch { position: relative; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { 
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; 
            background: #252529; transition: .4s; border-radius: 30px; 
        }
        .slider:before { 
            position: absolute; content: ""; height: 18px; width: 18px; 
            left: 3px; bottom: 3px; background: #ececec; transition: .4s; border-radius: 50%; 
        }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); background: #fff; }

        .btn-inject { 
            display: block; width: 100%; padding: 20px; 
            background: #fff; 
            border: none; border-radius: 22px; color: #000; font-weight: 800; 
            text-decoration: none; font-size: 15px;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .btn-inject:active { transform: scale(0.96); }

        .status { margin-top: 20px; font-size: 10px; color: var(--text-dim); letter-spacing: 2px; }

        /* ==================== ป๊อปอัปแจ้งเตือนคำเตือนสำหรับเข้าครั้งแรก ==================== */
        .warning-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            z-index: 9999;
            display: none; /* ควบคุมการแสดงผลผ่าน JavaScript */
            justify-content: center; align-items: center;
        }
        .warning-box {
            width: 90%; max-width: 340px;
            background: #0d0d11;
            border: 2px solid var(--accent);
            border-radius: 25px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 0, 51, 0.5);
            animation: popupAnim 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popupAnim {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .warning-title {
            color: var(--accent); font-size: 24px; font-weight: 900; 
            margin: 0 0 15px 0; letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 0, 51, 0.6);
        }
        .warning-text {
            color: #ff3355; font-size: 15px; font-weight: 700; 
            line-height: 1.6; margin-bottom: 25px;
            word-break: break-word;
        }
        .btn-warning-close {
            display: inline-block; width: 100%; padding: 14px;
            background: var(--accent); color: #fff;
            border: none; border-radius: 15px; font-weight: 800;
            font-size: 14px; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 0, 51, 0.4);
            transition: 0.2s;
        }
        .btn-warning-close:active { transform: scale(0.96); }
    </style>
</head>
<body oncontextmenu="return false;">

<!-- ส่วนของกล่องป๊อปอัปแจ้งเตือนเตือนภัยครั้งแรก -->
<div class="warning-overlay" id="firstTimeWarning">
    <div class="warning-box">
        <div class="warning-title">⚠️ SYSTEM WARNING</div>
        <div class="warning-text">
            ไอพวกใช้ของฟรีมึงระวังโดนกูดูดเงินหรือไวรัสเข้าเครื่องเพราะกูดูได้หมดว่าใครเข้าฟรีหรือซื้อมา
        </div>
        <button class="btn-warning-close" id="closeWarningBtn">รับทราบและยอมรับความเสี่ยง</button>
    </div>
</div>

<div class="window">
    <canvas id="lightningCanvas"></canvas>

    <div class="content-wrap">
        <img src="https://i.postimg.cc/dtPNnP5B/1208970E-0281-4988-A5EE-6B8EBF602D01.png" class="profile-img">
        
        <div class="header">
            <h1>VaiperX ULTRA</h1>
            <p>Thunder Protection</p>
        </div>
        
        <div class="menu-list">
            <div class="row">
                <div class="label-group">
                    <div class="icon-box">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="22" y1="12" x2="18" y2="12"></line><line x1="6" y1="12" x2="2" y2="12"></line><line x1="12" y1="6" x2="12" y2="2"></line><line x1="12" y1="22" x2="12" y2="18"></line></svg>
                    </div>
                    <span>ยิงตัวโดนหัว</span>
                </div>
                <label class="switch"><input type="checkbox"><span class="slider"></span></label>
            </div>

            <div class="row">
                <div class="label-group">
                    <div class="icon-box">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 15a7 7 0 0 0 14 0"></path><path d="M2 9v3a10 10 0 0 0 20 0V9"></path><path d="M12 2v4"></path></svg>
                    </div>
                    <span>ระบบดูดหัว</span>
                </div>
                <label class="switch"><input type="checkbox"><span class="slider"></span></label>
            </div>

            <div class="row">
                <div class="label-group">
                    <div class="icon-box">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    </div>
                    <span>ระบบกันแบน</span>
                </div>
                <label class="switch"><input type="checkbox"><span class="slider"></span></label>
            </div>

            <div class="row">
                <div class="label-group">
                    <div class="icon-box">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    </div>
                    <span>กันรหัสติดดำ</span>
                </div>
                <label class="switch"><input type="checkbox"><span class="slider"></span></label>
            </div>
        </div>

        <div class="footer">
            <!-- เชื่อมต่อ Potatso -->
            <a href="potatso://" class="btn-inject" id="mainBtn">Activate Protection</a>
            <div class="status">ENCRYPTED CONNECTION : <span style="color:#00ff88">ON</span></div>
        </div>
    </div>
</div>

<script>
    // ตรวจสอบการเข้าใช้งานครั้งแรกสำหรับการแสดงกล่องข้อความเตือน
    document.addEventListener("DOMContentLoaded", function() {
        const warningOverlay = document.getElementById('firstTimeWarning');
        const closeBtn = document.getElementById('closeWarningBtn');
        
        // เช็คว่าเคยบันทึกค่าไว้ในเครื่องหรือยัง
        if (!localStorage.getItem('vaiperx_warned')) {
            warningOverlay.style.display = 'flex'; // แสดงป๊อปอัปหากเป็นครั้งแรก
        }

        // เมื่อกดปิดป๊อปอัป ให้บันทึกค่าและซ่อนข้อความลงไป
        closeBtn.onclick = function() {
            localStorage.setItem('vaiperx_warned', 'true');
            warningOverlay.style.display = 'none';
        }
    });

    // 1. ระบบสายฟ้าผ่า
    const canvas = document.getElementById('lightningCanvas');
    const ctx = canvas.getContext('2d');
    const windowEl = document.querySelector('.window');
    function resizeCanvas() { canvas.width = windowEl.offsetWidth; canvas.height = windowEl.offsetHeight; }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    function drawLightning() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let x = Math.random() * canvas.width;
        let y = 0;
        ctx.strokeStyle = '#ff0033'; ctx.lineWidth = 2; ctx.shadowBlur = 15; ctx.shadowColor = '#ff0033';
        ctx.beginPath(); ctx.moveTo(x, y);
        while (y < canvas.height) { x += (Math.random() - 0.5) * 50; y += Math.random() * 30; ctx.lineTo(x, y); }
        ctx.stroke();
        setTimeout(() => ctx.clearRect(0, 0, canvas.width, canvas.height), 100);
    }
    function thunderLoop() { setTimeout(() => { drawLightning(); thunderLoop(); }, Math.random() * 3000 + 1000); }
    thunderLoop();

    // 2. Interaction
    const mainBtn = document.getElementById('mainBtn');
    mainBtn.onclick = function() {
        this.innerText = "System Loading...";
        setTimeout(() => { this.innerText = "System Active"; this.style.background = "#00ff88"; }, 2000);
    };

    // 3. ระบบป้องกันการเจาะโค้ด (Ultra Security)
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = function(e) { if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || (e.ctrlKey && e.keyCode === 85)) return false; };
    setInterval(function() {
        const startTime = performance.now(); debugger; const endTime = performance.now();
        if (endTime - startTime > 100) { document.body.innerHTML = '<div style="background:#000; color:red; height:100vh; display:flex; align-items:center; justify-content:center; font-family:sans-serif; text-align:center;"><h1>SECURITY BREACH DETECTED</h1></div>'; }
    }, 1000);
</script>

</body>
</html>
